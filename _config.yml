# About Section
about_profile_image: images/profile.jpg
about_content: |
  Computational linguist and digital humanities researcher working with OCR, historical corpora, NLP pipelines, and semantic change analysis. Strong focus on Arabic- and Persian-script languages.

  My research combines traditional linguistic approaches with modern computational methods to analyze historical texts and language evolution, particularly in Middle Eastern languages.

content:
  - title: Projects
    layout: list
    content:
      - layout: left
        border: weak
        title: OCR-Based Corpus Analysis of Persian Reform Lexicon
        link: https://github.com/Quchluk/persian-ocr-reform-analysis
        link_text: GitHub Repository
        additional_links:
          - title: persian-ocr-reform-analysis
            icon: fab fa-github
            url: https://github.com/Quchluk/persian-ocr-reform-analysis
        description: |
          Developed a comprehensive pipeline for analyzing Persian reform discourse through OCR processing of historical texts. Implemented Tesseract OCR with custom training, TF-DF analysis, and SQLite database integration. Utilized multi-threaded processing to efficiently handle large corpora.

      - layout: left
        border: weak
        title: Diachronic Semantic Clustering of Arabic
        description: |
          Created a system for tracking semantic change in Arabic texts across different time periods. Utilized AraBERT for contextual embeddings, applied PCA for dimensionality reduction, and implemented KMeans clustering to identify semantic shifts. Developed visualization tools to track cosine similarity of terms over time.

      - layout: left
        border: weak
        title: ASR Transcript Normalization Tool
        description: |
          Built a pipeline for automatic speech recognition transcript processing using Vosk. Implemented preprocessing steps and structured normalization rules to improve transcript quality for further NLP analysis.

      - layout: left
        border: weak
        title: Narrative Vector Visualization Tool
        description: |
          Developed a tool for visualizing narrative structures in texts using sentence embeddings and UMAP dimensionality reduction. Created interactive visualizations to explore semantic relationships between narrative elements.

      - layout: left
        border: weak
        title: Educational NLP Webtool
        description: |
          Created a vocabulary training application for Chinese and Arabic language learners with a SQLite backend. Implemented spaced repetition algorithms and contextual examples to enhance learning efficiency.

      - layout: left
        border: weak
        title: OCR Pipeline for Arabic Manuscripts
        description: |
          Built a preprocessing and OCR system for Arabic script recognition in historical texts. Used image preprocessing (binarization, skew correction), segmentation, Farasa for token normalization, and CNN-based ligature classification. Adapted pipeline for early Islamic manuscripts.

      - layout: left
        border: weak
        title: Semantic Drift Detection with Persistent Homology
        description: |
          Applied topological data analysis to monitor semantic stability in historical Arabic corpora. Used Vietoris–Rips complex and persistence diagrams to analyze conceptual category evolution across diachronic text slices.

      - layout: left
        border: weak
        title: Silver Age Poets Corpus Project
        description: |
          Participated in structuring digital metadata for Russian Silver Age poets. Built a pipeline to convert semi-structured poetic metadata into SQLite and XML formats for integration in searchable digital corpora.

      - layout: left
        border: weak
        title: Word Embedding Heatmap Scanner
        description: |
          Designed a tool to visualize 10x10 heatmaps of embedding dimensions across full historical texts. Enabled spatial semantic analysis of entire corpora through pixel-wise heat tracking of vector shifts.

